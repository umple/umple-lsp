name: Publish npm package

# Manual npm release for packages/server (umple-lsp-server).
#
# Authentication uses npm Trusted Publishing via GitHub Actions OIDC.
# One-time npm package settings must match:
#   Provider: GitHub Actions
#   Organization/user: umple
#   Repository: umple-lsp
#   Workflow filename: publish-npm.yml
#   Environment: npm-publish
#
# The GitHub environment `npm-publish` is the human approval gate.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Expected umple-lsp-server version, e.g. 1.0.1"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish umple-lsp-server
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Verify branch
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "master" ]]; then
            echo "Refusing to publish from ${GITHUB_REF_NAME}; run this workflow from master."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@^11.5.1

      - name: Verify toolchain
        run: |
          set -euo pipefail
          node --version
          npm --version

      - name: Verify requested version
        run: |
          set -euo pipefail
          actual="$(node -p "require('./packages/server/package.json').version")"
          if [[ "$actual" != "${{ inputs.version }}" ]]; then
            echo "packages/server/package.json is $actual, expected ${{ inputs.version }}"
            exit 1
          fi

      - name: Verify version is not already published
        run: |
          set -euo pipefail
          if npm view "umple-lsp-server@${{ inputs.version }}" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "umple-lsp-server@${{ inputs.version }} is already published."
            exit 1
          fi

      - name: Install npm dependencies
        run: npm install

      - name: Download umplesync.jar for compiler-backed tests
        run: npm run download-jar

      - name: Run tests
        run: npm test

      - name: Verify server version output
        run: |
          set -euo pipefail
          actual="$(node packages/server/out/server.js --version)"
          if [[ "$actual" != "${{ inputs.version }}" ]]; then
            echo "server --version is $actual, expected ${{ inputs.version }}"
            exit 1
          fi

      - name: Dry-run npm publish
        working-directory: packages/server
        run: npm publish --dry-run

      - name: Publish to npm
        working-directory: packages/server
        run: npm publish

      - name: Verify published version
        run: |
          set -euo pipefail
          published="$(npm view umple-lsp-server version --registry https://registry.npmjs.org/)"
          if [[ "$published" != "${{ inputs.version }}" ]]; then
            echo "npm registry reports $published, expected ${{ inputs.version }}"
            exit 1
          fi
          echo "Published umple-lsp-server@$published"
