name: Publish npm package

# Manual npm release for packages/server (umple-lsp-server).
#
# Authentication uses npm Trusted Publishing via GitHub Actions OIDC.
# One-time npm package settings must match:
#   Provider: GitHub Actions
#   Organization/user: umple
#   Repository: umple-lsp
#   Workflow filename: publish-npm.yml
#   Environment: npm-publish
#
# The GitHub environment `npm-publish` is the human approval gate.

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish umple-lsp-server
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Verify branch
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" != "master" ]]; then
            echo "Refusing to publish from ${GITHUB_REF_NAME}; run this workflow from master."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@^11.5.1

      - name: Verify toolchain
        run: |
          set -euo pipefail
          node --version
          npm --version

      - name: Resolve release version
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./packages/server/package.json').version")"
          echo "EXPECTED_VERSION=$package_version" >> "$GITHUB_ENV"
          echo "Publishing umple-lsp-server@$package_version"

      - name: Verify version is not already published
        run: |
          set -euo pipefail
          if npm view "umple-lsp-server@$EXPECTED_VERSION" version --registry https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "umple-lsp-server@$EXPECTED_VERSION is already published."
            exit 1
          fi

      - name: Install npm dependencies
        run: npm install

      - name: Download umplesync.jar for compiler-backed tests
        run: npm run download-jar

      - name: Run tests
        run: npm test

      - name: Verify server version output
        run: |
          set -euo pipefail
          actual="$(node packages/server/out/server.js --version)"
          if [[ "$actual" != "$EXPECTED_VERSION" ]]; then
            echo "server --version is $actual, expected $EXPECTED_VERSION"
            exit 1
          fi

      - name: Dry-run npm publish
        working-directory: packages/server
        run: npm publish --dry-run

      - name: Publish to npm
        working-directory: packages/server
        run: npm publish

      - name: Verify published version
        run: |
          set -euo pipefail
          expected="$EXPECTED_VERSION"
          exact=""
          for attempt in {1..12}; do
            exact="$(npm view "umple-lsp-server@$expected" version --registry https://registry.npmjs.org/ 2>/dev/null || true)"
            if [[ "$exact" == "$expected" ]]; then
              break
            fi
            echo "Exact version $expected is not visible yet (attempt $attempt/12); waiting for propagation..."
            sleep 10
          done

          if [[ "$exact" != "$expected" ]]; then
            echo "npm registry does not expose umple-lsp-server@$expected yet; got '${exact:-not found}'"
            exit 1
          fi

          latest=""
          for attempt in {1..20}; do
            latest="$(npm view umple-lsp-server version --registry https://registry.npmjs.org/ || true)"
            if [[ "$latest" == "$expected" ]]; then
              echo "Published umple-lsp-server@$expected; latest reports $latest"
              exit 0
            fi
            echo "Exact version $expected exists, but latest reports '$latest' (attempt $attempt/20); waiting for propagation..."
            sleep 15
          done

          echo "Published umple-lsp-server@$expected; exact version is available. Latest still reports '$latest' after propagation wait."
